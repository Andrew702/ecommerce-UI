<div class="px-6 py-8">
  @if (productService.filteredProducts().length === 0) {
    <div class="flex flex-col items-center justify-center py-20">
      <svg
        class="mb-4"
        style="color: var(--color-text-light); width: 56px; height: 56px"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
        />
      </svg>
      <h3 style="color: var(--color-text-muted); margin: 0 0 4px">No products found</h3>
      <p style="color: var(--color-text-light); margin: 0 0 16px; font-size: var(--text-sm)">
        Try adjusting your filters or search query.
      </p>
      <button class="btn-secondary" (click)="productService.clearFilters()">
        Clear All Filters
      </button>
    </div>
  } @else {
    <div class="flex flex-wrap gap-3">
      @for (item of productService.filteredProducts(); track item.id) {
        <app-productcard
          [product]="item"
          [ShopVerseChoice]="productService.ShopVerseChoice()"
        ></app-productcard>
      }
    </div>
  }
</div>
